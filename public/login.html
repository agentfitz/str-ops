<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — BMF Enterprises</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F9F6F0;
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: #FFFFFF;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow-md);
    }

    .login-wordmark {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 400;
      color: var(--color-text);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .login-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-faint);
      margin-bottom: 32px;
    }

    .login-divider {
      height: 1px;
      background: var(--color-border);
      margin-bottom: 32px;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: #1D4A35;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: background 150ms ease;
    }

    .btn-google:hover { background: #163a29; }

    .btn-google svg { flex-shrink: 0; }

    .login-footer {
      margin-top: 20px;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      color: var(--color-text-faint);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .login-error {
      margin-top: 20px;
      padding: 12px 16px;
      background: var(--color-negative-bg);
      border: 1px solid #e8c4c4;
      border-radius: 4px;
      font-size: 0.875rem;
      color: var(--color-negative);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="login-wordmark">BMF Enterprises</h1>
    <p class="login-eyebrow">Operations Dashboard</p>
    <div class="login-divider"></div>

    <a href="/api/auth/google" class="btn-google">
      <!-- Google "G" icon -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#fff" fill-opacity=".9"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#fff" fill-opacity=".7"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#fff" fill-opacity=".5"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#fff" fill-opacity=".3"/>
      </svg>
      Sign in with Google
    </a>

    <div id="error-msg" class="login-error" style="display: none;">
      That Google account isn't authorized to access this dashboard.
    </div>

    <p class="login-footer">Internal use only</p>
  </div>

  <script>
    if (new URLSearchParams(window.location.search).get('error') === 'unauthorized') {
      document.getElementById('error-msg').style.display = 'block'
    }
  </script>
</body>
</html>
