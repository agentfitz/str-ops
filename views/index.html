<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STR Ops — Dashboard</title>

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/card.css">
  <link rel="stylesheet" href="/css/table.css">

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

  <!-- Utility bar -->
  <div class="util-nav">
    <div class="util-nav__inner">
      <span>BMF Enterprises · Internal Use Only</span>
      <span class="util-nav__right">
        <a href="https://stay.bmf.llc" target="_blank" rel="noopener" class="util-nav__link">stay.bmf.llc ↗</a>
        <span class="util-nav__sep">·</span>
        <span class="util-nav__email">{{USER_EMAIL}}</span>
        <span class="util-nav__sep">·</span>
        <a href="/api/auth/logout" class="util-nav__link">Logout</a>
      </span>
    </div>
  </div>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="/" class="nav__brand">BMF <span>STR</span></a>
      <ul class="nav__links">
        <li><a href="/dashboard" class="nav__link nav__link--active">Dashboard</a></li>
        <li><a href="/views/bookings" class="nav__link">Bookings</a></li>
        <li><a href="/views/financials" class="nav__link">Financials</a></li>
        <li><a href="/views/reports" class="nav__link">Reports</a></li>
        <li><a href="/views/admin" class="nav__link">Admin</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main -->
  <main class="main page" x-data="dashboard()">
    <div class="container">

      <!-- Page header -->
      <div style="margin-bottom: var(--space-8);">
        <p class="text-faint text-sm text-mono" x-text="currentDate"></p>
        <h1>Portfolio Overview</h1>
      </div>

      <!-- Filters -->
      <div class="filter-bar" style="margin-bottom: var(--space-8);">
        <select class="filter-select filter-select--year" x-model="selectedYear" @change="fetchMetrics()">
          <template x-for="year in years" :key="year">
            <option :value="year" x-text="year"></option>
          </template>
        </select>

        <select class="filter-select" x-model="selectedMonth" @change="fetchMetrics()">
          <option value="all">All Months</option>
          <template x-for="m in months" :key="m.value">
            <option :value="m.value" :selected="m.value === selectedMonth" x-text="m.label"></option>
          </template>
        </select>

        <select class="filter-select" x-model="selectedProperty" @change="fetchMetrics()">
          <option value="all">All Properties</option>
          <template x-for="p in properties" :key="p.id">
            <option :value="p.id" x-text="p.display_name"></option>
          </template>
        </select>
      </div>

      <!-- Loading -->
      <div class="loading" x-show="loading">Loading...</div>

      <!-- Metrics -->
      <template x-if="!loading">
        <div>

          <!-- KPI cards -->
          <div class="metric-grid">
            <div class="metric-card">
              <div class="metric-card__label">Gross Revenue</div>
              <div class="metric-card__value" x-text="fmt.currency(metrics.grossRevenue)"></div>
              <div class="metric-card__delta" x-text="metrics.revenueNights + ' revenue nights'"></div>
            </div>
            <div class="metric-card">
              <div class="metric-card__label">Occupancy</div>
              <div class="metric-card__value" x-text="fmt.pct(metrics.occupancy)"></div>
              <div class="metric-card__delta" x-text="metrics.bookedNights + ' / ' + metrics.availableNights + ' nights'"></div>
            </div>
            <div class="metric-card">
              <div class="metric-card__label">ADR</div>
              <div class="metric-card__value" x-text="fmt.currency(metrics.adr)"></div>
              <div class="metric-card__delta">avg daily rate</div>
            </div>
            <div class="metric-card">
              <div class="metric-card__label">RevPAR</div>
              <div class="metric-card__value" x-text="fmt.currency(metrics.revpar)"></div>
              <div class="metric-card__delta">revenue per avail. night</div>
            </div>
            <div class="metric-card">
              <div class="metric-card__label">Total Bookings</div>
              <div class="metric-card__value" x-text="metrics.totalBookings"></div>
              <div class="metric-card__delta" x-text="metrics.ownerNights + ' owner nights'"></div>
            </div>
          </div>

          <hr class="divider">

          <!-- Per-property breakdown -->
          <div class="section-header">
            <h3>By Property</h3>
            <span class="section-header__action text-mono" x-text="periodLabel"></span>
          </div>

          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Property</th>
                  <th class="right mono">Bookings</th>
                  <th class="right mono">Occ %</th>
                  <th class="right mono">ADR</th>
                  <th class="right mono">RevPAR</th>
                  <th class="right mono">Gross Revenue</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="row in propertyRows" :key="row.id">
                  <tr>
                    <td><span class="property-badge" x-text="row.display_name"></span></td>
                    <td class="right mono" x-text="row.totalBookings"></td>
                    <td class="right mono" x-text="fmt.pct(row.occupancy)"></td>
                    <td class="right mono" x-text="fmt.currency(row.adr)"></td>
                    <td class="right mono" x-text="fmt.currency(row.revpar)"></td>
                    <td class="right mono" x-text="fmt.currency(row.grossRevenue)"></td>
                  </tr>
                </template>
                <tr x-show="propertyRows.length === 0">
                  <td colspan="6" class="table-empty">No data for selected period</td>
                </tr>
              </tbody>
            </table>
          </div>

          <hr class="divider">

          <!-- Forward occupancy -->
          <div class="section-header">
            <h3>Occupancy Forecast</h3>
            <span class="section-header__action text-sm text-muted">next 90 days</span>
          </div>

          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Property</th>
                  <th class="right mono">7-day %</th>
                  <th class="right mono">14-day %</th>
                  <th class="right mono">30-day %</th>
                  <th class="right mono">60-day %</th>
                  <th class="right mono">90-day %</th>
                  <th class="right mono">Nights Booked (90d)</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="row in forwardOccupancy" :key="row.property_id">
                  <tr>
                    <td><span class="property-badge" x-text="row.display_name"></span></td>
                    <td class="right mono" x-text="fmt.pct(row.occ_7)"></td>
                    <td class="right mono" x-text="fmt.pct(row.occ_14)"></td>
                    <td class="right mono" x-text="fmt.pct(row.occ_30)"></td>
                    <td class="right mono" x-text="fmt.pct(row.occ_60)"></td>
                    <td class="right mono" x-text="fmt.pct(row.occ_90)"></td>
                    <td class="right mono" x-text="row.nights_booked"></td>
                  </tr>
                </template>
                <tr x-show="forwardOccupancy.length === 0">
                  <td colspan="7" class="table-empty">No occupancy forecast data</td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </template>

    </div>
  </main>

  <script>
    const MONTH_NAMES = [
      'January','February','March','April','May','June',
      'July','August','September','October','November','December'
    ]

    function dashboard() {
      const now = new Date()
      return {
        loading: true,
        selectedYear: String(now.getFullYear()),
        selectedMonth: String(now.getMonth() + 1), // 1-based, default to current month
        selectedProperty: 'all',
        years: [String(now.getFullYear())],
        months: MONTH_NAMES.map((label, i) => ({ label, value: String(i + 1) })),
        properties: [],
        metrics: {},
        propertyRows: [],
        forwardOccupancy: [],

        currentDate: now.toLocaleDateString('en-US', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        }),

        get periodLabel() {
          if (this.selectedMonth === 'all') return String(this.selectedYear)
          return `${MONTH_NAMES[this.selectedMonth - 1]} ${this.selectedYear}`
        },

        fmt: {
          currency: (v) => v == null ? '—' : new Intl.NumberFormat('en-US', {
            style: 'currency', currency: 'USD', maximumFractionDigits: 0
          }).format(v),
          pct: (v) => v == null ? '—' : (v * 100).toFixed(1) + '%',
        },

        async init() {
          await Promise.all([this.fetchProperties(), this.fetchYears()])
          await this.fetchMetrics()
        },

        async fetchProperties() {
          const res = await fetch('/api/properties')
          const data = await res.json()
          this.properties = data.filter(p => p.active)
        },

        async fetchYears() {
          const res = await fetch('/api/reservations/years')
          const data = await res.json()
          const years = data.map(String)
          this.years = years
          // Keep current year selected if it exists, otherwise default to most recent
          if (years.length && !years.includes(this.selectedYear)) {
            this.selectedYear = years[0]
          }
        },

        async fetchMetrics() {
          this.loading = true
          const params = new URLSearchParams({
            year: this.selectedYear,
            month: this.selectedMonth,
            property: this.selectedProperty,
          })
          const [summaryRes, forwardRes] = await Promise.all([
            fetch(`/api/metrics/summary?${params}`),
            fetch(`/api/metrics/forward?${params}`),
          ])
          const summary = await summaryRes.json()
          const forward = await forwardRes.json()

          this.metrics = summary.portfolio
          this.propertyRows = summary.byProperty
          this.forwardOccupancy = forward
          this.loading = false
        },
      }
    }
  </script>

</body>
</html>
